<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythmic Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button class="nav-btn" onclick="show('shorts')">Shorts</button>
        <button class="nav-btn" onclick="show('rate')">Rate</button>
        <button class="nav-btn" onclick="show('suggest')">Suggest</button>
        <button class="nav-btn" onclick="show('contact')">Contact</button>
    </nav>

    <div id="shorts" class="page"><div id="shorts-container" class="shorts-container"></div></div>
    
    <div id="rate" class="page" style="display:none;">
        <img src="1000098019.webp" class="logo">
        <h2 class="theme-text">OPERATE IN SILENCE</h2>
        <div class="star-rating" id="star-rating">
            <span onclick="setRating(5)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(1)">★</span>
        </div>
        <textarea id="rate-text" class="neon-input" placeholder="Feedback..."></textarea>
        <button class="neon-btn" onclick="submitData('rate')">📩</button>
    </div>

    <div id="suggest" class="page" style="display:none;">
        <img src="1000098019.webp" class="logo">
        <h2 class="theme-text">OPERATE IN SILENCE</h2>
        <textarea id="suggest-text" class="neon-input" placeholder="Suggest..."></textarea>
        <button class="neon-btn" onclick="submitData('suggest')">🚀</button>
    </div>

    <div id="contact" class="page" style="display:none;">
        <img src="1000098019.webp" class="logo">
        <h2 class="theme-text">OPERATE IN SILENCE</h2>
        <p>Email: <a href="mailto:rhythmicbeats98@gmail.com" style="color:#00d4ff">rhythmicbeats98@gmail.com</a></p>
    </div>

    <script>
        // FIXED: Commit hash අයින් කරලා හැමදාම අලුත්ම එක ස්වයංක්‍රීයව ලෝඩ් වෙන ස්ථිර ලින්ක් එකක් හැදුවා
        const GIST_RAW_URL = "https://gist.githubusercontent.com/rhythmic-beats-genz/db979807d4a0a16b3320ff9d81522c26/raw/shorts.js";
        let currentRating = 0;
        function setRating(r) { currentRating = r; alert('Rating set to ' + r); }
        
        async function submitData(type) {
            const url = "https://script.google.com/macros/s/AKfycbyPp_Ad84bu4DA-wnhqrUM7rWZ6QCRcgK-5paDDA4NV7DgUoH3_NMaC2QrKMz1FWDhCZA/exec";
            const text = type === 'rate' ? document.getElementById('rate-text').value : document.getElementById('suggest-text').value;
            const rating = type === 'rate' ? currentRating : 'N/A';
            
            await fetch(url, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ rating: rating, suggestion: text })
            });
            alert("Sent successfully!");
        }

        function show(id) { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
        function react(btn) { btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        
        async function loadHubVideos() {
            const response = await fetch(GIST_RAW_URL + "?nocache=" + new Date().getTime());
            const videos = await response.json();
            const container = document.getElementById('shorts-container');
            container.innerHTML = '';
            
            // Dates පිළිවෙළට sorting logic එක වැඩ
            videos.sort((a, b) => new Date(b.date) - new Date(a.date));
            videos.forEach(v => { 
                container.innerHTML += `<div class="video-card"><iframe src="https://www.youtube.com/embed/${v.id}" frameborder="0" allowfullscreen></iframe><div class="reactions"><button onclick="react(this)">❤️</button><button onclick="react(this)">👍</button><button onclick="react(this)">👎</button></div></div>`; 
            });
        }
        
        loadHubVideos();
    </script>
</body>
</html>
